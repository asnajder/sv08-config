# need to manually change this:
# https://github.com/Klipper3d/klipper/blob/master/klippy/extras/ldc1612.py#L94
# from else 2 -> else 4

[probe_eddy_current my_eddy_probe]
sensor_type: ldc1612
descend_z: 0.5
#   The nominal distance (in mm) between the nozzle and bed that a
#   probing attempt should stop at. This parameter must be provided.
i2c_mcu: extra_mcu
i2c_software_scl_pin: extra_mcu:PB6
i2c_software_sda_pin: extra_mcu:PB7
x_offset: -16.43
y_offset: 10.22
#   See the "probe" section for information on these parameters.
tap_threshold: 112 # use top value from line z: 2.010 # noise 0.002495mm, MAD_Hz=56.434 multiplied by 2
#   Noise cutoff/stop trigger threshold delta Hz per sample
#   See the Eddy_Probe.md for explanation
reg_drive_current: 22 # manually set as cold bed is 20, 60C bed is 21, best results at 22
tap_z_offset: 0 # old offset, seems still useful here. Raises Z tap by 0.05

[bed_mesh]
speed: 250 #500
horizontal_move_z: 1.5
mesh_min: 13,15 # from official Sovol firmware config
mesh_max: 333,340 # from official Sovol firmware config
probe_count: 15,15 # Set to a lower 15,15 default as it appears a too high probe_count (too dense mesh) is bad with rapid_scan, see: https://www.klipper3d.org/Bed_Mesh.html#rapid-continuous-scanning
algorithm: bicubic
bicubic_tension: 0.5
split_delta_z: 0.0125 # see: https://www.klipper3d.org/Bed_Mesh.html#move-splitting
mesh_pps: 3,3
adaptive_margin: 5
fade_start: 1
fade_end: 10
fade_target: 0
scan_overshoot: 4  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning.

# COMMENTED FOR REFERENCE, WE NOW USE HOMING OVERRIDE BELOW
#[safe_z_home]
#home_xy_position: 172, 172
#z_hop: 10
#z_hop_speed: 25
#speed: 200

# THIS HOMING OVERRIDE ALWAYS GOES BACK TO CENTER FIRST BEFORE HOMING THE OTHER AXIS
# THIS ALREADY INCLUDES THE EDDY HOMING OVERRIDES/CHANGES
[homing_override]
gcode:
  # Move 5 up, just in case (this is our safety zhop, this needs 'set_position_z: 0' below)
  G91 ; set relative positioning
  G0 Z5 F1000 ; 5 up zhop
  {% if not rawparams or 'Y' in rawparams %}
    {action_respond_info('Homing Y')}
    G28 Y
    G90 ; set absolute positioning
    G0 Y177.5 F6000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'X' in rawparams %}
    {action_respond_info('Homing X')}
    G28 X
    G90 ; set absolute positioning
    G0 X177.5 F6000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'Z' in rawparams %}
    {action_respond_info('Homing Z')}
    G90 ; set absolute positioning
    G0 X177.5 Y177.5 F6000 ; return to center, please add your offsets manually if you want to
    G28 Z
    #G91 ; set relative positioning
    G0 Z10 F1000 ; 10mm zhop before probe
    G0 Z2 F1000
    M400
    SET_Z_FROM_PROBE #METHOD=tap
    G0 Z5 F1000 ; 5mm up
    M400 ; Wait for move to finish
  {% endif %}
  G90 ; set absolute positioning
axes: xyz
set_position_z: 0 # This forces the z position to be at 0 when we start homing, so we can move the Z up before homing.

[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
gcode:
  {% set Z = printer.toolhead.position.z %}
  SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}

[gcode_macro SET_Z_FROM_PROBE]
gcode:
    {% set METHOD = params.METHOD | default("automatic") %}
    {% set SAMPLES = params.SAMPLES | default(5) %}
    {% set PROBE_SPEED = params.PROBE_SPEED | default(3) %}
    {% set LIFT_SPEED = params.LIFT_SPEED | default(3) %}
    {% set SAMPLE_RETRACT_DIST = params.SAMPLE_RETRACT_DIST | default(2) %}
    {% set SAMPLES_TOLERANCE_RETRIES = params.SAMPLES_TOLERANCE_RETRIES | default(3) %}
    {% set SAMPLES_TOLERANCE = params.SAMPLES_TOLERANCE | default(0.025) %}
    PROBE METHOD={METHOD} SAMPLES={SAMPLES} PROBE_SPEED={PROBE_SPEED} LIFT_SPEED={LIFT_SPEED} SAMPLE_RETRACT_DIST={SAMPLE_RETRACT_DIST} SAMPLES_TOLERANCE_RETRIES={SAMPLES_TOLERANCE_RETRIES} SAMPLES_TOLERANCE={SAMPLES_TOLERANCE}
    #PROBE METHOD={METHOD}
    _RELOAD_Z_OFFSET_FROM_PROBE
    G0 Z5

[gcode_macro _ADJ_SCAN_FROM_TAP]
gcode:
    {% set OFFSET = printer.probe.last_probe_position.z %}
    SET_GCODE_OFFSET Z={(-OFFSET)}

[gcode_macro SET_SCAN_FROM_TAP]
gcode:
    {% set SAMPLES = params.SAMPLES | default(5) %}
    {% set PROBE_SPEED = params.PROBE_SPEED | default(3) %}
    {% set LIFT_SPEED = params.LIFT_SPEED | default(3) %}
    {% set SAMPLES_TOLERANCE_RETRIES = params.SAMPLES_TOLERANCE_RETRIES | default(3) %}
    {% set SAMPLES_TOLERANCE = params.SAMPLES_TOLERANCE | default(0.025) %}

    SET_Z_FROM_PROBE METHOD=tap
    # Move to the tap point
    {% set is_absolute = printer.gcode_move.absolute_coordinates %}
    G90
    {% set cf = printer.configfile.settings %}
    {% set eddy = cf["probe_eddy_current my_eddy_probe"] %}
    {% set amap = printer.gcode_move.axis_map %}
    {% set tpos = printer.gcode_move.position %}
    G0 Z5 F300 # Z-Hop
    G0 Y{tpos[amap["Y"]] - eddy.y_offset} X{tpos[amap["X"]] - eddy.x_offset} F3000
    G0 Z{eddy.descend_z} F300
    #PROBE METHOD=scan SAMPLES={SAMPLES} PROBE_SPEED={PROBE_SPEED} LIFT_SPEED={LIFT_SPEED} SAMPLES_TOLERANCE_RETRIES={SAMPLES_TOLERANCE_RETRIES} SAMPLES_TOLERANCE={SAMPLES_TOLERANCE}
    PROBE METHOD=scan
    _ADJ_SCAN_FROM_TAP
    {% if not is_absolute %}
    G91
    {% endif %}